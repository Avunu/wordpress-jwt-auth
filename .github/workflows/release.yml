name: Release

# Release Please maintains a release PR from Conventional Commits on main. The repo has two
# independently-versioned packages:
#   • "."      the PHP plugin      → tag v{version}                → build+attach the Nix zip
#   • "worker" @avunu/jwt-auth-worker → tag jwt-auth-worker-v{version} → publish to GitHub Packages
# The root package keeps unprefixed v{version} tags so plugin-update-checker keeps working; the
# worker carries a component prefix. Root outputs are unprefixed; the worker's are `worker--*`.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Uses release-please-config.json + .release-please-manifest.json.

      # Checkout once if ANY package released this run.
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.releases_created }}

      # --- Plugin (root package): build the Nix zip + attach to its v{version} release ------
      - uses: DeterminateSystems/nix-installer-action@main
        if: ${{ steps.release.outputs.release_created }}

      - name: Build plugin zip
        if: ${{ steps.release.outputs.release_created }}
        run: nix build .#zip -L

      - name: Attach zip to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            result/jwt-auth.zip --clobber

      # --- Worker package: publish @avunu/jwt-auth-worker to GitHub Packages ----------------
      - name: Setup Node
        if: ${{ steps.release.outputs['worker--release_created'] }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@avunu"

      - name: Publish @avunu/jwt-auth-worker
        if: ${{ steps.release.outputs['worker--release_created'] }}
        working-directory: worker
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          npm publish

      # The worker ships via npm (GitHub Packages); its GitHub Release is informational.
      # Mark it a prerelease so it never becomes the repo's "Latest" release — otherwise the
      # plugin's update checker (which follows /releases/latest) would pick up a worker tag
      # that has no jwt-auth.zip asset and fall back to the vendor-less source tarball.
      - name: Keep worker release out of plugin-update-checker's way
        if: ${{ steps.release.outputs['worker--release_created'] }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ steps.release.outputs['worker--tag_name'] }}" --prerelease --latest=false
