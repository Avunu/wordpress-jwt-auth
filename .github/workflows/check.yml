name: Check

# Runs the worker package's OXC/TypeScript quality gate (oxfmt + oxlint + type-aware oxlint +
# tsc) plus its tests on every push and pull request. The PHP plugin has no JS toolchain; the
# release build (release.yml) is separate.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - run: npm run check

      - run: npm test
