name: Check

# Quality gates on every push and pull request (so Dependabot PRs are gated before
# auto-merge). Two jobs:
#   • worker  — the worker package's OXC/TypeScript gate (oxfmt + oxlint + type-aware + tsc) + tests
#   • phpstan — PHP static analysis (level 8, WordPress-aware) via the flake's checks.phpstan
# The release build (release.yml) is separate.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - run: npm run check

      - run: npm test

  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@main

      # Self-contained, offline: composerDeps (WordPress/WooCommerce stubs + phpstan-wordpress)
      # come from composer.lock; the phpstan binary from nixpkgs. Builds under pure eval.
      - run: nix build .#checks.x86_64-linux.phpstan -L
