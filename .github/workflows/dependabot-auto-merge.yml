name: Dependabot auto-merge

# Enables auto-merge on every Dependabot PR. GitHub then merges it once the branch is
# mergeable and all *required* status checks pass — so protect `main` with the Check
# workflow to gate merges on green CI. Nothing is published on merge: release-please still
# gates production releases (dep bumps are `chore`, so they never trigger a release alone).
#
# Requires (one-time, in repo settings):
#   • Settings → General → Pull Requests → "Allow auto-merge"
#   • (recommended) Settings → Branches → protect `main`, require the "Check" status checks
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
