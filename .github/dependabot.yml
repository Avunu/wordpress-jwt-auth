version: 2

# Keeps every ecosystem in this repo up to date. Updates land on `main` automatically
# (see .github/workflows/dependabot-auto-merge.yml); release-please remains the gate for
# actually cutting a plugin/worker release. Dep bumps use the `chore` type so they never
# force a release on their own — they ride along with the next real release.
updates:
  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: chore
    groups:
      github-actions:
        patterns: ["*"]

  # PHP plugin dependencies (composer.json / composer.lock).
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: chore
    groups:
      composer:
        patterns: ["*"]

  # The companion worker package (worker/package.json + worker/package-lock.json).
  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: daily
    commit-message:
      prefix: chore
    groups:
      npm:
        patterns: ["*"]
